site_name: Kaappi
site_url: https://kaappi-lang.org/
site_description: A complete R7RS-small Scheme implementation written in Zig
repo_url: https://github.com/kaappi/kaappi
repo_name: kaappi/kaappi

theme:
  name: material
  custom_dir: overrides
  # These primary/accent colors are effectively overridden by the "Dark Roast"
  # palette in docs/stylesheets/extra.css — change brand colors THERE, not here.
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: assets/logo.svg
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Try It: playground.md
  - Tour: https://kaappi-lang.org/tour/
  - Download: download.md
  - Guide:
    - guide/index.md
    - Getting Started:
      - Installation: guide/installation.md
      - Your First Program: guide/first-program.md
      - Scheme Tutorial: guide/tutorial.md
    - Language:
      - Language Reference: guide/language.md
      - Libraries: guide/libraries.md
      - Library Authoring: guide/library-authoring.md
      - SRFI Support: guide/srfi-support.md
      - Concurrency: guide/concurrency.md
    - Tooling:
      - REPL Guide: guide/repl.md
      - CLI Reference: guide/cli.md
      - Debugging: guide/debugging.md
      - Editor Support: guide/editors.md
    - Extending:
      - C Extensions: guide/c-extensions.md
      - Zig Extensions: guide/zig-extensions.md
    - In Production:
      - Security: guide/security.md
      - Deployment: guide/deployment.md
      - Migrating from Other Schemes: guide/migrating.md
      - Troubleshooting: guide/troubleshooting.md
  - Procedures:
    - procedures/index.md
    - R7RS Core:
      - Numbers and Arithmetic: procedures/numbers.md
      - Pairs and Lists: procedures/pairs-and-lists.md
      - Strings: procedures/strings.md
      - Characters: procedures/characters.md
      - Vectors: procedures/vectors.md
      - Bytevectors: procedures/bytevectors.md
      - Ports and I/O: procedures/ports-and-io.md
      - Control Flow: procedures/control-flow.md
      - Type Checking: procedures/type-checking.md
      - System and Environment: procedures/system.md
      - Syntax Forms: procedures/syntax-forms.md
    - SRFI Libraries:
      - SRFI-1 List Library: procedures/srfi-1.md
      - SRFI-13 String Library: procedures/srfi-13.md
      - SRFI-133 Vector Library: procedures/srfi-133.md
      - SRFI-18 Threads: procedures/threads.md
      - SRFI-69 Hash Tables: procedures/hash-tables.md
      - SRFI-170 Filesystem: procedures/srfi-170.md
    - Extensions:
      - Kaappi Extensions: procedures/extensions.md
      - Other Primitives: procedures/other.md
  - Cookbook:
    - cookbook/index.md
    - Build a REST API: cookbook/rest-api.md
    - Call HTTP APIs: cookbook/http-client.md
    - Serve HTML with Templates: cookbook/html-templates.md
    - Process JSON Data: cookbook/json-processing.md
    - Parse and Generate CSV: cookbook/csv-processing.md
    - Store Data in SQLite: cookbook/sqlite-storage.md
    - Read Configuration Files: cookbook/config-files.md
    - Run Concurrent Tasks: cookbook/concurrent-tasks.md
    - Write Tests: cookbook/testing.md
    - Build a CLI Tool: cookbook/cli-tool.md
  - Ecosystem:
    - ecosystem/index.md
    - Package Manager (thottam): ecosystem/thottam.md
    - Web & Networking:
      - Networking (TCP/TLS): ecosystem/net.md
      - HTTP / HTTPS: ecosystem/http.md
      - Web Framework: ecosystem/web.md
      - Templates: ecosystem/template.md
      - Email (SMTP): ecosystem/email.md
    - Data Formats:
      - JSON: ecosystem/json.md
      - TOML: ecosystem/toml.md
      - YAML: ecosystem/yaml.md
      - CSV: ecosystem/csv.md
    - Databases:
      - PostgreSQL: ecosystem/pg.md
      - SQLite: ecosystem/sqlite.md
      - Redis: ecosystem/redis.md
    - Developer Tools:
      - Testing: ecosystem/test.md
      - BDD Testing: ecosystem/bdd.md
      - Logging: ecosystem/log.md
      - Crypto (Hashing): ecosystem/crypto.md
      - CLI Parsing: ecosystem/cli.md
    - Examples: ecosystem/examples.md
  - About:
    - FAQ: faq.md
    - Community: community.md
    - Stability: stability.md
    - Glossary: glossary.md

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

# tour.md is intentionally outside nav: its nav entry links to the
# absolute production URL so the Tour opens full-page.
not_in_nav: |
  tour.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - tables
  - admonition
  - toc:
      permalink: true
  - attr_list

plugins:
  - search
  - macros:
      # Off by default so pages like ecosystem/template.md, which document
      # Go-style {{.name}} syntax, aren't mangled by Jinja. Pages that use
      # {{ kaappi_version }} or procedures_table opt in with `render_macros: true`.
      render_by_default: false
      # Fail the build on a macro error (e.g. procedures_table hitting a
      # procedure heading with no `<!-- index: -->` metadata) rather than
      # embedding the error in the page.
      on_error_fail: true
  - redirects:
      redirect_maps:
        guide/advanced.md: guide/concurrency.md
        guide/tips.md: guide/troubleshooting.md
        downloads.md: download.md
        libraries.md: guide/library-authoring.md

extra_css:
  - stylesheets/extra.css

extra:
  kaappi_version: 0.13.0
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kaappi/kaappi
    - icon: octicons/comment-discussion-16
      link: https://github.com/orgs/kaappi/discussions

watch:
  - overrides

copyright: MIT License &mdash; Built with Zig

exclude_docs: |
  errata-corrected-r7rs.pdf
