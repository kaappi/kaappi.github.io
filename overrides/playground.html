{% extends "main.html" %}

{% block tabs %}{{ super() }}{% endblock %}

{% block content %}
<style>
  .md-content__inner > h1 { display: none; }
  .md-content__inner { margin-top: 0; padding: 0; max-width: none; }
  .md-content__inner::before { display: none; }

  /* Dark Roast --kp-* tokens are defined in docs/stylesheets/extra.css */

  .kp-play {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 3rem);
    height: calc(100dvh - 3rem);
    min-height: 400px;
    font-family: var(--kp-mono);
  }

  /* ---- Toolbar ---- */
  .kp-play-toolbar {
    display: flex;
    align-items: center;
    gap: .75rem;
    padding: .5rem .75rem;
    background: var(--kp-roast);
    border-bottom: 1px solid var(--kp-roast-3);
    flex-shrink: 0;
  }

  .kp-play-toolbar button {
    background: var(--kp-brass);
    color: var(--kp-roast);
    border: none;
    padding: .4rem 1.2rem;
    border-radius: 4px;
    font-family: var(--kp-mono);
    font-size: .85rem;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s;
  }
  .kp-play-toolbar button:hover { background: var(--kp-brass-2); }
  .kp-play-toolbar button:active { transform: scale(.97); }
  .kp-play-toolbar button:disabled {
    opacity: .5;
    cursor: not-allowed;
  }

  .kp-play-toolbar select {
    background: var(--kp-roast-2);
    color: var(--kp-crema);
    border: 1px solid var(--kp-roast-3);
    padding: .35rem .5rem;
    border-radius: 4px;
    font-family: var(--kp-mono);
    font-size: .8rem;
    cursor: pointer;
  }

  #kp-status {
    color: var(--kp-ash);
    font-size: .8rem;
    margin-left: auto;
  }
  #kp-status.running { color: var(--kp-brass-2); }
  #kp-status.done    { color: var(--kp-filter); }
  #kp-status.error   { color: #E07070; }

  .kp-play-label {
    color: var(--kp-ash);
    font-size: .7rem;
    opacity: .6;
  }

  .kp-play-link {
    font-size: .78rem;
    color: var(--kp-ash);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .kp-play-link:hover { color: var(--kp-brass-2); border-bottom-color: var(--kp-brass); }
  [data-md-color-scheme="default"] .kp-play-link { color: #8A7A6A; }
  [data-md-color-scheme="default"] .kp-play-link:hover { color: #9A6520; border-bottom-color: #9A6520; }

  /* ---- Panels ---- */
  .kp-play-panels {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  .kp-play-editor {
    flex: 1;
    overflow: hidden;
    background: var(--kp-roast);
  }

  .kp-play-output {
    flex: 1;
    overflow: auto;
    background: var(--kp-roast-2);
    padding: .75rem;
    border-left: 1px solid var(--kp-roast-3);
  }

  .kp-play-output pre {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: var(--kp-mono);
    font-size: .85rem;
    line-height: 1.5;
  }

  #kp-stdout { color: var(--kp-crema); }
  #kp-stderr { color: #E07070; }
  #kp-stdout:empty + #kp-stderr:empty::before {
    content: "Output appears here.";
    color: var(--kp-ash);
    opacity: .5;
  }

  /* ---- CodeMirror overrides ---- */
  .kp-play-editor .cm-editor {
    height: 100%;
    font-size: .85rem;
  }
  .kp-play-editor .cm-editor.cm-focused { outline: none; }
  .kp-play-editor .cm-scroller { overflow: auto; }
  .kp-play-editor .cm-gutters {
    background: var(--kp-roast);
    color: var(--kp-ash);
    border-right: 1px solid var(--kp-roast-3);
  }
  .kp-play-editor .cm-content { padding: .5rem 0; color: var(--kp-crema); }
  .kp-play-editor .cm-line { padding: 0 .75rem; }
  .kp-play-editor .cm-activeLine { background: rgba(255,255,255,.03); }
  .kp-play-editor .cm-selectionBackground { background: rgba(208,139,60,.25) !important; }
  .kp-play-editor .cm-cursor { border-left-color: var(--kp-crema); }
  .kp-play-editor .cm-matchingBracket {
    background: rgba(79,196,178,.2);
    outline: 1px solid var(--kp-filter);
  }

  /* ---- Mobile ---- */
  @media (max-width: 820px) {
    .kp-play {
      height: calc(100dvh - 3rem);
      min-height: 0;
    }
    .kp-play-toolbar {
      flex-wrap: wrap;
      gap: .4rem;
      padding: .4rem .5rem;
    }
    .kp-play-toolbar button { min-height: 44px; }
    .kp-play-toolbar select { min-height: 44px; }
    #kp-status {
      order: 10;
      flex-basis: 100%;
      margin-left: 0;
    }
    .kp-play-panels { flex-direction: column; }
    .kp-play-editor { min-height: 40%; }
    .kp-play-output {
      border-left: none;
      border-top: 1px solid var(--kp-roast-3);
      min-height: 120px;
      max-height: 40vh;
    }
  }

  @media (max-width: 480px) {
    .kp-play-link { display: none; }
    .kp-play-toolbar { gap: .3rem; }
    .kp-play-editor .cm-editor { font-size: .8rem; }
  }

  /* ---- Light mode adjustments ---- */
  [data-md-color-scheme="default"] .kp-play-toolbar { background: #F5F0EB; border-color: #DDD5CB; }
  [data-md-color-scheme="default"] .kp-play-toolbar select { background: #EDE6DC; color: #1A1410; border-color: #DDD5CB; }
  [data-md-color-scheme="default"] #kp-status { color: #8A7A6A; }
  [data-md-color-scheme="default"] .kp-play-editor { background: #FDFAF6; }
  [data-md-color-scheme="default"] .kp-play-editor .cm-gutters { background: #FDFAF6; color: #BBA890; border-color: #EDE6DC; }
  [data-md-color-scheme="default"] .kp-play-editor .cm-activeLine { background: rgba(0,0,0,.03); }
  [data-md-color-scheme="default"] .kp-play-editor .cm-content { color: #1A1410; }
  [data-md-color-scheme="default"] .kp-play-editor .cm-cursor { border-left-color: #1A1410; }
  [data-md-color-scheme="default"] .kp-play-output { background: #F5F0EB; border-color: #DDD5CB; }
  [data-md-color-scheme="default"] #kp-stdout { color: #1A1410; }
</style>

<div class="kp-play">
  <div class="kp-play-toolbar">
    <button id="kp-run" title="Run (Ctrl+Enter)">&#9654; Run</button>
    <select id="kp-examples" aria-label="Example programs">
      <option value="">Examples</option>
      <option value="hello">Hello World</option>
      <option value="fib">Fibonacci</option>
      <option value="higher">Higher-Order</option>
      <option value="macros">Macros</option>
      <option value="callcc">Continuations</option>
      <option value="tail">Tail Recursion</option>
      <option value="library">define-library</option>
    </select>
    <span id="kp-status">Ready</span>
    <a href="../tour/" class="kp-play-link">Guided tour &rarr;</a>
  </div>

  <div class="kp-play-panels">
    <div class="kp-play-editor" id="kp-editor"></div>
    <div class="kp-play-output">
      <pre id="kp-stdout"></pre>
      <pre id="kp-stderr"></pre>
    </div>
  </div>
</div>

<script>
(async function() {
// Clean up any state from a previous instant-navigation visit
if (window._kpPlaygroundRunner) {
  window._kpPlaygroundRunner.terminate();
  window._kpPlaygroundRunner = null;
}
if (window._kpPlaygroundEditor) {
  window._kpPlaygroundEditor.destroy();
  window._kpPlaygroundEditor = null;
}

const assetRoot = new URL("{{ base_url }}", document.baseURI).href.replace(/\/$/, "");
const { EXAMPLES } = await import(assetRoot + "/js/playground-examples.mjs");

// ---- Editor + runner (shared modules) ----
const { createSchemeEditor } = await import(assetRoot + "/js/kp-editor.mjs");
const { createRunner } = await import(assetRoot + "/js/kp-runner.mjs");

const statusEl = document.getElementById("kp-status");
const stdoutEl = document.getElementById("kp-stdout");
const stderrEl = document.getElementById("kp-stderr");
const runBtn = document.getElementById("kp-run");
const exSelect = document.getElementById("kp-examples");

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || "";
}

const runner = createRunner();
window._kpPlaygroundRunner = runner;

let editor;

async function runCode() {
  const code = editor.getContent();
  if (!code.trim()) return;

  stdoutEl.textContent = "";
  stderrEl.textContent = "";
  setStatus("Running…", "running");
  runBtn.disabled = true;

  try {
    const result = await runner.run(code);
    stdoutEl.textContent = result.stdout;
    stderrEl.textContent = result.stderr;
    const ms = Math.round(result.elapsed);
    setStatus(result.stderr ? `Done (${ms} ms) — errors` : `Done (${ms} ms)`,
              result.stderr ? "error" : "done");
  } catch (e) {
    stderrEl.textContent = e.message;
    setStatus("Error", "error");
  } finally {
    runBtn.disabled = false;
  }
}

runBtn.addEventListener("click", runCode);

exSelect.addEventListener("change", () => {
  const key = exSelect.value;
  if (key && EXAMPLES[key]) {
    editor.setContent(EXAMPLES[key]);
    stdoutEl.textContent = "";
    stderrEl.textContent = "";
    setStatus("Ready");
  }
  exSelect.value = "";
});

editor = await createSchemeEditor({
  parent: document.getElementById("kp-editor"),
  doc: EXAMPLES.hello,
  isDark: document.documentElement.dataset.mdColorScheme === "slate",
  onRun: runCode,
});
window._kpPlaygroundEditor = editor;

})();
</script>
{% endblock %}
