{% extends "main.html" %}

{% block tabs %}{{ super() }}{% endblock %}

{% block content %}
<style>
  .md-content__inner > h1 { display: none; }
  .md-content__inner { margin-top: 0; padding: 0; max-width: none; }
  .md-content__inner::before { display: none; }

  /* Dark Roast --kp-* tokens are defined in docs/stylesheets/extra.css */

  /* ---- Layout ---- */
  .kp-tour {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 3rem);
    height: calc(100dvh - 3rem);
    min-height: 500px;
  }

  .kp-tour-toolbar {
    display: flex;
    align-items: center;
    gap: .5rem;
    padding: .4rem .75rem;
    background: var(--kp-roast);
    border-bottom: 1px solid var(--kp-roast-3);
    flex-shrink: 0;
  }

  .kp-tour-body {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ---- Toolbar ---- */
  .kp-tour-toolbar button {
    background: var(--kp-roast-2);
    color: var(--kp-crema);
    border: 1px solid var(--kp-roast-3);
    padding: .35rem .7rem;
    border-radius: 4px;
    font-family: var(--kp-mono);
    font-size: .8rem;
    cursor: pointer;
    transition: background .15s;
  }
  .kp-tour-toolbar button:hover { background: var(--kp-roast-3); }
  .kp-tour-toolbar button:disabled { opacity: .35; cursor: default; }

  #kp-tour-run {
    background: var(--kp-brass);
    color: var(--kp-roast);
    border: none;
    font-weight: 700;
  }
  #kp-tour-run:hover { background: var(--kp-brass-2); }
  #kp-tour-run:active { transform: scale(.97); }
  #kp-tour-run:disabled { opacity: .5; cursor: not-allowed; }

  .kp-tour-link {
    margin-left: auto;
    font-size: .78rem;
    color: var(--kp-ash);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .kp-tour-link:hover { color: var(--kp-brass-2); border-bottom-color: var(--kp-brass); }
  [data-md-color-scheme="default"] .kp-tour-link { color: #8A7A6A; }
  [data-md-color-scheme="default"] .kp-tour-link:hover { color: #9A6520; border-bottom-color: #9A6520; }

  .kp-tour-title {
    color: var(--kp-crema);
    font-family: var(--kp-disp);
    font-size: .85rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    text-align: center;
  }

  #kp-tour-status {
    color: var(--kp-ash);
    font-size: .75rem;
    font-family: var(--kp-mono);
  }
  #kp-tour-status.running { color: var(--kp-brass-2); }
  #kp-tour-status.done    { color: var(--kp-filter); }
  #kp-tour-status.error   { color: #E07070; }

  /* ---- Sidebar ---- */
  .kp-tour-sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--kp-roast);
    border-right: 1px solid var(--kp-roast-3);
    overflow-y: auto;
    padding: .5rem 0;
    flex-shrink: 0;
  }

  .kp-tour-sidebar ol {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .kp-tour-sidebar li {
    padding: .4rem .75rem .4rem 1rem;
    font-family: var(--kp-mono);
    font-size: .78rem;
    color: var(--kp-ash);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: .4rem;
    transition: background .1s, color .1s;
    border-left: 3px solid transparent;
  }
  .kp-tour-sidebar li:hover {
    background: var(--kp-roast-2);
    color: var(--kp-crema);
  }
  .kp-tour-sidebar li.active {
    background: var(--kp-roast-2);
    color: var(--kp-crema);
    border-left-color: var(--kp-brass);
    font-weight: 600;
  }
  .kp-tour-sidebar li .check {
    color: var(--kp-filter);
    font-size: .7rem;
    width: 1rem;
    text-align: center;
    flex-shrink: 0;
  }

  /* ---- Main panel ---- */
  .kp-tour-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  .kp-tour-prose {
    padding: 1rem 1.25rem;
    overflow-y: auto;
    color: var(--kp-crema);
    font-family: var(--md-text-font-family), "Inter", sans-serif;
    font-size: .88rem;
    line-height: 1.65;
    max-height: 40%;
    flex-shrink: 0;
    border-bottom: 1px solid var(--kp-roast-3);
    background: var(--kp-roast);
  }
  .kp-tour-prose h3 { margin: 0 0 .5rem; font-family: var(--kp-disp); color: var(--kp-brass-2); font-size: 1.1rem; }
  .kp-tour-prose p { margin: 0 0 .6rem; }
  .kp-tour-prose code {
    font-family: var(--kp-mono);
    background: var(--kp-roast-2);
    padding: .1rem .3rem;
    border-radius: 3px;
    font-size: .82rem;
    color: var(--kp-filter);
  }
  .kp-tour-prose strong { color: var(--kp-brass-2); font-weight: 600; }

  .kp-tour-editor {
    flex: 1;
    min-height: 120px;
    overflow: hidden;
    background: var(--kp-roast-2);
  }

  .kp-tour-output {
    min-height: 60px;
    max-height: 30%;
    overflow-y: auto;
    background: var(--kp-roast);
    border-top: 1px solid var(--kp-roast-3);
    padding: .5rem .75rem;
  }
  .kp-tour-output pre {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: var(--kp-mono);
    font-size: .82rem;
    line-height: 1.5;
  }
  #kp-tour-stdout { color: var(--kp-crema); }
  #kp-tour-stderr { color: #E07070; }

  .kp-tour-challenge {
    margin-top: .4rem;
    padding: .4rem .6rem;
    background: var(--kp-roast-2);
    border-radius: 4px;
    font-family: var(--kp-mono);
    font-size: .78rem;
    color: var(--kp-brass-2);
    border-left: 3px solid var(--kp-brass);
  }

  /* ---- CodeMirror overrides ---- */
  .kp-tour-editor .cm-editor { height: 100%; font-size: .85rem; }
  .kp-tour-editor .cm-editor.cm-focused { outline: none; }
  .kp-tour-editor .cm-scroller { overflow: auto; }
  .kp-tour-editor .cm-gutters { background: var(--kp-roast-2); color: var(--kp-ash); border-right: 1px solid var(--kp-roast-3); }
  .kp-tour-editor .cm-content { padding: .4rem 0; color: var(--kp-crema); }
  .kp-tour-editor .cm-line { padding: 0 .75rem; }
  .kp-tour-editor .cm-activeLine { background: rgba(255,255,255,.03); }
  .kp-tour-editor .cm-selectionBackground { background: rgba(208,139,60,.25) !important; }
  .kp-tour-editor .cm-cursor { border-left-color: var(--kp-crema); }
  .kp-tour-editor .cm-matchingBracket { background: rgba(79,196,178,.2); outline: 1px solid var(--kp-filter); }

  /* ---- Mobile sidebar toggle ---- */
  #kp-tour-menu-toggle {
    display: none;
    background: var(--kp-roast-2);
    color: var(--kp-crema);
    border: 1px solid var(--kp-roast-3);
    padding: .35rem .5rem;
    border-radius: 4px;
    font-size: .85rem;
    cursor: pointer;
  }

  @media (max-width: 820px) {
    .kp-tour {
      height: calc(100dvh - 3rem);
      min-height: 0;
    }
    .kp-tour-link { display: none; }
    #kp-tour-menu-toggle { display: block; min-height: 44px; }
    .kp-tour-toolbar {
      flex-wrap: wrap;
      row-gap: .25rem;
      padding: .35rem .5rem;
    }
    .kp-tour-toolbar button { min-height: 44px; }
    .kp-tour-title {
      font-size: .78rem;
      min-width: 5rem;
    }
    .kp-tour-sidebar {
      position: fixed;
      top: 3rem;
      left: 0;
      bottom: 0;
      z-index: 100;
      width: 260px;
      min-width: 260px;
      transform: translateX(-100%);
      transition: transform .2s;
      box-shadow: 2px 0 8px rgba(0,0,0,.4);
    }
    .kp-tour-sidebar.open { transform: translateX(0); }
    .kp-tour-sidebar li { min-height: 44px; }
    .kp-tour-prose {
      max-height: 30%;
      font-size: .84rem;
      padding: .75rem 1rem;
    }
    .kp-tour-editor { min-height: 30%; }
    .kp-tour-output { max-height: 25%; }
  }

  @media (max-width: 480px) {
    .kp-tour-title { font-size: .72rem; }
    .kp-tour-prose {
      max-height: 25%;
      padding: .6rem .75rem;
    }
    .kp-tour-prose h3 { font-size: .95rem; margin-bottom: .35rem; }
    .kp-tour-editor .cm-editor { font-size: .8rem; }
    #kp-tour-reset { font-size: .7rem; padding: .35rem .4rem; }
  }

  /* ---- Light mode ---- */
  [data-md-color-scheme="default"] .kp-tour-toolbar { background: #F5F0EB; border-color: #DDD5CB; }
  [data-md-color-scheme="default"] .kp-tour-toolbar button { background: #EDE6DC; color: #1A1410; border-color: #DDD5CB; }
  [data-md-color-scheme="default"] .kp-tour-title { color: #1A1410; }
  [data-md-color-scheme="default"] .kp-tour-sidebar { background: #FDFAF6; border-color: #EDE6DC; }
  [data-md-color-scheme="default"] .kp-tour-sidebar li { color: #8A7A6A; }
  [data-md-color-scheme="default"] .kp-tour-sidebar li:hover { background: #F5F0EB; color: #1A1410; }
  [data-md-color-scheme="default"] .kp-tour-sidebar li.active { background: #F5F0EB; color: #1A1410; }
  [data-md-color-scheme="default"] .kp-tour-prose { background: #FDFAF6; color: #1A1410; border-color: #EDE6DC; }
  [data-md-color-scheme="default"] .kp-tour-prose code { background: #EDE6DC; color: #1A6E5E; }
  [data-md-color-scheme="default"] .kp-tour-prose strong { color: #9A6520; }
  [data-md-color-scheme="default"] .kp-tour-editor { background: #F5F0EB; }
  [data-md-color-scheme="default"] .kp-tour-editor .cm-gutters { background: #F5F0EB; color: #BBA890; border-color: #EDE6DC; }
  [data-md-color-scheme="default"] .kp-tour-editor .cm-content { color: #1A1410; }
  [data-md-color-scheme="default"] .kp-tour-editor .cm-cursor { border-left-color: #1A1410; }
  [data-md-color-scheme="default"] .kp-tour-editor .cm-activeLine { background: rgba(0,0,0,.03); }
  [data-md-color-scheme="default"] .kp-tour-output { background: #FDFAF6; border-color: #EDE6DC; }
  [data-md-color-scheme="default"] #kp-tour-stdout { color: #1A1410; }
  [data-md-color-scheme="default"] .kp-tour-challenge { background: #EDE6DC; color: #7A5A20; }
  [data-md-color-scheme="default"] #kp-tour-status { color: #8A7A6A; }
</style>

<div class="kp-tour">
  <div class="kp-tour-toolbar">
    <button id="kp-tour-menu-toggle" title="Lessons">&#9776;</button>
    <button id="kp-tour-prev" title="Previous lesson">&larr;</button>
    <span class="kp-tour-title" id="kp-tour-title">1 / 12 &mdash; Hello, Scheme!</span>
    <button id="kp-tour-next" title="Next lesson">&rarr;</button>
    <button id="kp-tour-run" title="Run (Ctrl+Enter)">&#9654; Run</button>
    <span id="kp-tour-status"></span>
    <a href="../playground/" class="kp-tour-link">Free playground &rarr;</a>
    <button id="kp-tour-reset" title="Reset code">Reset</button>
  </div>

  <div class="kp-tour-body">
    <nav class="kp-tour-sidebar" id="kp-tour-sidebar">
      <ol id="kp-tour-lesson-list"></ol>
    </nav>

    <div class="kp-tour-main">
      <div class="kp-tour-prose" id="kp-tour-prose"></div>
      <div class="kp-tour-editor" id="kp-tour-editor"></div>
      <div class="kp-tour-output">
        <pre id="kp-tour-stdout"></pre>
        <pre id="kp-tour-stderr"></pre>
        <div class="kp-tour-challenge" id="kp-tour-challenge" hidden></div>
      </div>
    </div>
  </div>
</div>

<script>
(async function() {
// Clean up any state from a previous instant-navigation visit
if (window._kpTourWorker) {
  window._kpTourWorker.terminate();
  window._kpTourWorker = null;
}
if (window._kpTourEditor) {
  window._kpTourEditor.destroy();
  window._kpTourEditor = null;
}

const assetRoot = new URL("{{ base_url }}", document.baseURI).href.replace(/\/$/, "");
const { LESSONS } = await import(assetRoot + "/js/tour-lessons.mjs");

// ---- State ----
let currentLesson = 0;
let editorView = null;
let progress;
try {
  progress = JSON.parse(localStorage.getItem("kaappi-tour-progress") || "[]");
  if (!Array.isArray(progress)) progress = [];
} catch {
  progress = [];  // corrupt/unavailable localStorage must not brick the tour
}

// ---- Sidebar ----
const listEl = document.getElementById("kp-tour-lesson-list");
function buildSidebar() {
  listEl.innerHTML = "";
  LESSONS.forEach((lesson, i) => {
    const li = document.createElement("li");
    const check = document.createElement("span");
    check.className = "check";
    check.textContent = progress.includes(i) ? "✓" : (i + 1);
    li.appendChild(check);
    li.appendChild(document.createTextNode(lesson.title));
    if (i === currentLesson) li.classList.add("active");
    li.addEventListener("click", () => { goToLesson(i); });
    listEl.appendChild(li);
  });
}

// ---- Lesson loading ----
const proseEl = document.getElementById("kp-tour-prose");
const titleEl = document.getElementById("kp-tour-title");
const challengeEl = document.getElementById("kp-tour-challenge");
const prevBtn = document.getElementById("kp-tour-prev");
const nextBtn = document.getElementById("kp-tour-next");

function loadLesson(idx) {
  const lesson = LESSONS[idx];
  currentLesson = idx;
  proseEl.innerHTML = lesson.prose;
  titleEl.textContent = `${idx + 1} / ${LESSONS.length} — ${lesson.title}`;
  setEditorContent(lesson.code);
  document.getElementById("kp-tour-stdout").textContent = "";
  document.getElementById("kp-tour-stderr").textContent = "";
  if (lesson.challenge) {
    challengeEl.textContent = "💡 " + lesson.challenge;
    challengeEl.hidden = false;
  } else {
    challengeEl.hidden = true;
  }
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === LESSONS.length - 1;
  buildSidebar();
  setStatus("");

  // Close mobile sidebar
  document.getElementById("kp-tour-sidebar").classList.remove("open");
}

function goToLesson(idx) {
  if (idx >= 0 && idx < LESSONS.length) {
    location.hash = "#" + (idx + 1);
  }
}

function readHash() {
  const h = parseInt(location.hash.replace("#", ""), 10);
  return (h >= 1 && h <= LESSONS.length) ? h - 1 : 0;
}

prevBtn.addEventListener("click", () => goToLesson(currentLesson - 1));
nextBtn.addEventListener("click", () => goToLesson(currentLesson + 1));
window.addEventListener("hashchange", () => loadLesson(readHash()));

// ---- Mobile sidebar ----
document.getElementById("kp-tour-menu-toggle").addEventListener("click", () => {
  document.getElementById("kp-tour-sidebar").classList.toggle("open");
});
document.querySelector(".kp-tour-main").addEventListener("click", () => {
  document.getElementById("kp-tour-sidebar").classList.remove("open");
});

// ---- CodeMirror setup ----
async function initEditor() {
  try {
    const cmRoot = new URL("{{ base_url }}", document.baseURI).href.replace(/\/$/, "");
    const { EditorView, basicSetup, EditorState, StreamLanguage, HighlightStyle, syntaxHighlighting, tags, scheme: schemeMode } =
      await import(cmRoot + "/js/codemirror-bundle.mjs");

    const darkHighlight = HighlightStyle.define([
      { tag: [tags.keyword, tags.standard(tags.variableName)], color: "#E8B563" },
      { tag: tags.comment, color: "#9C8A77", fontStyle: "italic" },
      { tag: tags.string, color: "#BFD08A" },
      { tag: tags.number, color: "#E0A867" },
      { tag: tags.atom, color: "#E8B563" },
      { tag: [tags.variableName, tags.definition(tags.variableName)], color: "#4FC4B2" },
      { tag: tags.bracket, color: "#BBA890" },
      { tag: [tags.meta, tags.operator], color: "#D08B3C" },
    ]);

    const lightHighlight = HighlightStyle.define([
      { tag: [tags.keyword, tags.standard(tags.variableName)], color: "#9A6A1E" },
      { tag: tags.comment, color: "#9C8A77", fontStyle: "italic" },
      { tag: tags.string, color: "#5A7A22" },
      { tag: tags.number, color: "#9A6A1E" },
      { tag: tags.atom, color: "#9A6A1E" },
      { tag: [tags.variableName, tags.definition(tags.variableName)], color: "#1E8A7A" },
      { tag: tags.bracket, color: "#8A7A6A" },
      { tag: [tags.meta, tags.operator], color: "#A06A20" },
    ]);

    const isDark = document.documentElement.dataset.mdColorScheme === "slate";
    const theme = EditorView.theme({
      "&": { backgroundColor: "transparent" },
      ".cm-content": { caretColor: isDark ? "#F3E9DB" : "#1A1410" },
    }, { dark: isDark });

    const extensions = [
      basicSetup, theme,
      syntaxHighlighting(isDark ? darkHighlight : lightHighlight),
      EditorView.domEventHandlers({
        keydown(e) {
          if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
            e.preventDefault();
            document.getElementById("kp-tour-run").click();
          }
        }
      }),
    ];
    extensions.push(StreamLanguage.define(schemeMode));

    editorView = new EditorView({
      state: EditorState.create({ doc: LESSONS[currentLesson].code, extensions }),
      parent: document.getElementById("kp-tour-editor"),
    });
    window._kpTourEditor = editorView;
  } catch (e) {
    console.warn("CodeMirror failed to load; using plain textarea.", e);
    const el = document.getElementById("kp-tour-editor");
    const ta = document.createElement("textarea");
    ta.id = "kp-tour-ta";
    ta.value = LESSONS[currentLesson].code;
    ta.spellcheck = false;
    Object.assign(ta.style, {
      width: "100%", height: "100%", resize: "none", background: "transparent",
      color: "inherit", border: "none", outline: "none", padding: ".75rem",
      fontFamily: "var(--kp-mono)", fontSize: ".85rem", lineHeight: "1.5", tabSize: 2,
    });
    ta.addEventListener("keydown", e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); document.getElementById("kp-tour-run").click(); }
    });
    el.appendChild(ta);
  }
}

function getEditorContent() {
  if (editorView) return editorView.state.doc.toString();
  const ta = document.getElementById("kp-tour-ta");
  return ta ? ta.value : "";
}

function setEditorContent(code) {
  if (editorView) {
    editorView.dispatch({ changes: { from: 0, to: editorView.state.doc.length, insert: code } });
  } else {
    const ta = document.getElementById("kp-tour-ta");
    if (ta) ta.value = code;
  }
}

// ---- Reset ----
document.getElementById("kp-tour-reset").addEventListener("click", () => {
  setEditorContent(LESSONS[currentLesson].code);
  document.getElementById("kp-tour-stdout").textContent = "";
  document.getElementById("kp-tour-stderr").textContent = "";
  setStatus("");
});

// ---- Execution ----
const TIMEOUT_MS = 5000;
const siteRoot = new URL("{{ base_url }}", document.baseURI).href.replace(/\/$/, "");
const workerUrl = siteRoot + "/js/playground-worker.js";
const wasmUrl = siteRoot + "/wasm/kaappi.wasm";
var worker = new Worker(workerUrl, { type: "module" });
window._kpTourWorker = worker;

const statusEl = document.getElementById("kp-tour-status");
const runBtn = document.getElementById("kp-tour-run");

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || "";
}

async function runCode() {
  const code = getEditorContent();
  if (!code.trim()) return;

  document.getElementById("kp-tour-stdout").textContent = "";
  document.getElementById("kp-tour-stderr").textContent = "";
  setStatus("Running…", "running");
  runBtn.disabled = true;

  try {
    const result = await new Promise((resolve, reject) => {
      const timer = setTimeout(() => {
        worker.terminate();
        worker = new Worker(workerUrl, { type: "module" });
        window._kpTourWorker = worker;
        reject(new Error("Timed out (5 s limit)"));
      }, TIMEOUT_MS);
      worker.onmessage = ({ data }) => { clearTimeout(timer); resolve(data); };
      worker.onerror = (e) => { clearTimeout(timer); reject(new Error(e.message || "Worker error")); };
      worker.postMessage({ code, wasmUrl });
    });

    document.getElementById("kp-tour-stdout").textContent = result.stdout;
    document.getElementById("kp-tour-stderr").textContent = result.stderr;
    const ms = Math.round(result.elapsed);
    setStatus(result.stderr ? `Done (${ms} ms) — errors` : `Done (${ms} ms)`, result.stderr ? "error" : "done");

    // Mark lesson complete on successful run
    if (!result.stderr && !progress.includes(currentLesson)) {
      progress.push(currentLesson);
      localStorage.setItem("kaappi-tour-progress", JSON.stringify(progress));
      buildSidebar();
    }
  } catch (e) {
    document.getElementById("kp-tour-stderr").textContent = e.message;
    setStatus("Error", "error");
  } finally {
    runBtn.disabled = false;
  }
}

runBtn.addEventListener("click", runCode);

// ---- Init ----
currentLesson = readHash();
buildSidebar();
initEditor().then(() => loadLesson(currentLesson));

})();
</script>
{% endblock %}
