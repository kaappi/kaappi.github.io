name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Silence the mkdocs-material "MkDocs 2.0" advocacy banner (stderr only, never
# on the built site) so it doesn't clutter build logs. See material/templates.
env:
  NO_MKDOCS_2_WARNING: "true"

# Serialize deploys so two pushes can't race on the gh-pages branch.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build docs
        run: mkdocs build --strict

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch playground WASM
        run: scripts/fetch-wasm.sh

      - name: Fetch book PDF
        run: scripts/fetch-book.sh

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --strict
