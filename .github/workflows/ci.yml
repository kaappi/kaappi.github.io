name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs-material mkdocs-macros-plugin mkdocs-redirects

      - name: Check procedures index is in sync
        run: python3 scripts/check_procedures_index.py

      - name: Build docs
        run: mkdocs build --strict
