<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <circle cx="64" cy="64" r="58" fill="#1A1410"/>

  <!-- Steam wisps -->
  <path d="M46,28 C42,22 48,16 44,10" stroke="#D08B3C" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>
  <path d="M64,26 C60,18 66,12 62,8" stroke="#D08B3C" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M82,28 C86,22 80,16 84,10" stroke="#D08B3C" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- Pour-over cone body -->
  <path d="M28,38 L100,38 L70,96 Q64,102 58,96 Z" fill="#F3E9DB"/>

  <!-- Brass rim -->
  <rect x="24" y="32" width="80" height="8" rx="4" fill="#D08B3C"/>

  <!-- Eyes -->
  <circle cx="50" cy="56" r="4.5" fill="#1A1410"/>
  <circle cx="78" cy="56" r="4.5" fill="#1A1410"/>

  <!-- Eye highlights -->
  <circle cx="52" cy="54" r="1.8" fill="#F3E9DB" opacity="0.9"/>
  <circle cx="80" cy="54" r="1.8" fill="#F3E9DB" opacity="0.9"/>

  <!-- Cheeks -->
  <circle cx="48" cy="64" r="4" fill="#D08B3C" opacity="0.2"/>
  <circle cx="80" cy="64" r="4" fill="#D08B3C" opacity="0.2"/>

  <!-- Smile -->
  <path d="M54,70 Q64,79 74,70" stroke="#1A1410" stroke-width="2.5" fill="none" stroke-linecap="round"/>

</svg>
